<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Extension Blocker</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      width: 380px;
      background: #f8f9fa;
      color: #212529;
    }

    header {
      background: #1a1a2e;
      color: white;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    header .icon { font-size: 20px; }
    header h1 { font-size: 15px; font-weight: 600; }
    header .subtitle { font-size: 11px; opacity: 0.65; margin-top: 2px; }

    .body { padding: 14px; }

    .add-section {
      background: white;
      border: 1px solid #dee2e6;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 14px;
    }

    .add-section label {
      font-size: 11px;
      font-weight: 600;
      color: #6c757d;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      display: block;
      margin-bottom: 8px;
    }

    .input-row {
      display: flex;
      gap: 8px;
    }

    input[type="text"] {
      flex: 1;
      padding: 8px 10px;
      border: 1px solid #ced4da;
      border-radius: 6px;
      font-size: 12px;
      font-family: monospace;
      outline: none;
      transition: border-color 0.15s;
    }

    input[type="text"]:focus { border-color: #4361ee; }

    input[type="text"].error { border-color: #dc3545; }

    button.btn-add {
      padding: 8px 14px;
      background: #4361ee;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s;
    }

    button.btn-add:hover { background: #3451d1; }

    .error-msg {
      font-size: 11px;
      color: #dc3545;
      margin-top: 5px;
      display: none;
    }

    .list-header {
      font-size: 11px;
      font-weight: 600;
      color: #6c757d;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .list-header .count {
      background: #e9ecef;
      border-radius: 10px;
      padding: 1px 7px;
      font-size: 10px;
      color: #495057;
    }

    .empty-state {
      text-align: center;
      padding: 24px 16px;
      color: #adb5bd;
      font-size: 13px;
      background: white;
      border: 1px dashed #dee2e6;
      border-radius: 8px;
    }

    .empty-state .emoji { font-size: 28px; margin-bottom: 8px; }

    ul.ext-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    ul.ext-list li {
      background: white;
      border: 1px solid #dee2e6;
      border-radius: 8px;
      padding: 10px 12px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    ul.ext-list li .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    ul.ext-list li .status-dot.blocked { background: #dc3545; }
    ul.ext-list li .status-dot.not-installed { background: #adb5bd; }

    ul.ext-list li .info { flex: 1; min-width: 0; }

    ul.ext-list li .name {
      font-size: 13px;
      font-weight: 500;
      color: #212529;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    ul.ext-list li .ext-id {
      font-family: monospace;
      font-size: 10px;
      color: #6c757d;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    ul.ext-list li .badge {
      font-size: 10px;
      padding: 2px 7px;
      border-radius: 10px;
      font-weight: 600;
      flex-shrink: 0;
    }

    ul.ext-list li .badge.blocked {
      background: #fde8e8;
      color: #c0392b;
    }

    ul.ext-list li .badge.not-installed {
      background: #f0f0f0;
      color: #888;
    }

    button.btn-remove {
      background: none;
      border: none;
      color: #adb5bd;
      cursor: pointer;
      font-size: 16px;
      padding: 2px 4px;
      border-radius: 4px;
      line-height: 1;
      transition: color 0.15s, background 0.15s;
      flex-shrink: 0;
    }

    button.btn-remove:hover { color: #dc3545; background: #fde8e8; }

    .enforce-btn {
      width: 100%;
      margin-top: 14px;
      padding: 9px;
      background: #1a1a2e;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }

    .enforce-btn:hover { background: #2d2d50; }
  </style>
</head>
<body>
  <header>
    <div class="icon">🚫</div>
    <div>
      <h1>Extension Blocker</h1>
      <div class="subtitle">Désactive les extensions ciblées au démarrage</div>
    </div>
  </header>

  <div class="body">
    <div class="add-section">
      <label>Ajouter un ID d'extension à bloquer</label>
      <div class="input-row">
        <input type="text" id="newId" placeholder="ex: hjkinohfcakdnmkh..." maxlength="32" />
        <button class="btn-add" id="btnAdd">+ Ajouter</button>
      </div>
      <div class="error-msg" id="errorMsg"></div>
    </div>

    <div class="list-header">
      <span>Extensions bloquées</span>
      <span class="count" id="count">0</span>
    </div>

    <div id="listContainer">
      <div class="empty-state">
        <div class="emoji">🔓</div>
        Aucune extension bloquée pour l'instant
      </div>
    </div>

    <button class="enforce-btn" id="btnEnforce">⚡ Appliquer maintenant</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
